kind = "web"
previewPath = "/"
title = "The Hippie Scientist"
version = "1.0.0"
id = "artifacts/hippie-scientist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21116

[services.development]
run = "pnpm --filter @workspace/hippie-scientist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hippie-scientist", "run", "build" ]
publicDir = "artifacts/hippie-scientist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21116"
BASE_PATH = "/"
