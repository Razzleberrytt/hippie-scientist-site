name: Clean Rhodiola Generated Drift

on:
  push:
    branches:
      - patch/rhodiola-reviewable-v2

permissions:
  contents: write

jobs:
  clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: patch/rhodiola-reviewable-v2
          fetch-depth: 0

      - name: Restore generated parity exports from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- \
            data/generated/site/herbs.json \
            data/generated/site/compounds.json
          rm .github/workflows/rhodiola-generated-semantic-audit.yml
          rm .github/workflows/cleanup-rhodiola-generated-drift.yml
          git add -A
          git commit -m "data: isolate Rhodiola canonical transaction"
          git push origin HEAD:patch/rhodiola-reviewable-v2
