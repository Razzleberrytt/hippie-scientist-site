name: codex-next

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why this run was started
        required: false
        default: manual
  # Auto-trigger disabled — runs manually only.
  # repository_dispatch:
  #   types: [codex-next]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: codex-next
  cancel-in-progress: false

jobs:
  codex-next:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      # Requires OPENAI_API_KEY secret — disabled until re-enabled intentionally.
      # - name: Run Codex for the requested task
      #   id: run_codex
      #   uses: openai/codex-action@v1
      #   with:
      #     openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      #     prompt-file: .github/codex/prompts/run-next-step.md
      #     output-file: codex-output.md
      #     sandbox: workspace-write
      #     safety-strategy: drop-sudo

      - name: Upload Codex output
        if: ${{ hashFiles('codex-output.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-output-manual
          path: codex-output.md

      - name: Create or update pull request
        if: ${{ hashFiles('codex-output.md') != '' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "codex: manual update"
          branch: "codex/manual-update"
          delete-branch: true
          title: "codex: manual update"
          body-path: codex-output.md
          labels: |
            codex-managed
            automation

      - name: No Codex output
        if: ${{ hashFiles('codex-output.md') == '' }}
        run: echo "No codex-output.md found; skipping artifact upload and PR creation."
