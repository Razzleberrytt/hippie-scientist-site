name: codex-next

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why this run was started
        required: false
        default: manual
  repository_dispatch:
    types: [codex-next]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: codex-next
  cancel-in-progress: false

jobs:
  codex-next:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Read current queue step
        id: queue
        shell: bash
        run: |
          CURRENT_STEP=$(sed -n 's/^current:[[:space:]]*//p' ops/codex-queue.yaml | head -n 1 | tr -d '"')
          if [ -z "$CURRENT_STEP" ] || [ "$CURRENT_STEP" = "none" ]; then
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "current_step=" >> "$GITHUB_OUTPUT"
            echo "No current queue step found."
          else
            echo "has_work=true" >> "$GITHUB_OUTPUT"
            echo "current_step=$CURRENT_STEP" >> "$GITHUB_OUTPUT"
            echo "Current step: $CURRENT_STEP"
          fi

      - name: Run Codex for the current step
        if: ${{ steps.queue.outputs.has_work == 'true' }}
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/run-next-step.md
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Upload Codex output
        if: ${{ steps.queue.outputs.has_work == 'true' && hashFiles('codex-output.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: codex-output-${{ steps.queue.outputs.current_step }}
          path: codex-output.md

      - name: Create or update pull request
        if: ${{ steps.queue.outputs.has_work == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "codex: advance ${{ steps.queue.outputs.current_step }}"
          branch: "codex/${{ steps.queue.outputs.current_step }}"
          delete-branch: true
          title: "codex: advance ${{ steps.queue.outputs.current_step }}"
          body-path: codex-output.md
          labels: |
            codex-managed
            automation

      - name: Queue complete
        if: ${{ steps.queue.outputs.has_work != 'true' }}
        run: echo "Queue is complete or current step is not set."
