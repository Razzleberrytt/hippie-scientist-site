name: Rhodiola Generated Semantic Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - data/generated/site/herbs.json
      - data/generated/site/compounds.json
      - .github/workflows/rhodiola-generated-semantic-audit.yml

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build generated-record comparison report
        run: |
          git fetch origin main
          python <<'PY'
          import json
          import subprocess
          import traceback
          from pathlib import Path

          report_path = Path('rhodiola-generated-semantic-audit.json')

          def load_main(path):
              raw = subprocess.check_output(['git', 'show', f'origin/main:{path}'], text=True)
              return json.loads(raw)

          def load_head(path):
              return json.loads(Path(path).read_text())

          def changed_slugs(base, head):
              before = {record['slug']: record for record in base}
              after = {record['slug']: record for record in head}
              slugs = sorted(set(before) | set(after))
              return [slug for slug in slugs if before.get(slug) != after.get(slug)]

          try:
              herbs_path = 'data/generated/site/herbs.json'
              compounds_path = 'data/generated/site/compounds.json'
              base_herbs = load_main(herbs_path)
              head_herbs = load_head(herbs_path)
              base_compounds = load_main(compounds_path)
              head_compounds = load_head(compounds_path)

              changed_herbs = changed_slugs(base_herbs, head_herbs)
              changed_compounds = changed_slugs(base_compounds, head_compounds)
              rhodiola = next((record for record in head_herbs if record.get('slug') == 'rhodiola'), None)

              scope_ok = changed_herbs == ['rhodiola'] and not changed_compounds
              forms = rhodiola.get('forms', []) if rhodiola else []
              risk = rhodiola.get('evidence_risk_of_bias', '') if rhodiola else ''
              forms_ok = isinstance(forms, list) and any('3% rosavins' in str(value).lower() for value in forms)
              risk_ok = 'unclear randomization' in str(risk).lower()

              report = {
                  'ok': scope_ok and forms_ok and risk_ok,
                  'scopeOk': scope_ok,
                  'formsOk': forms_ok,
                  'riskOfBiasOk': risk_ok,
                  'changedHerbs': changed_herbs,
                  'changedCompounds': changed_compounds,
                  'counts': {
                      'changedHerbs': len(changed_herbs),
                      'changedCompounds': len(changed_compounds),
                  },
                  'rhodiola': {
                      'forms': forms,
                      'evidence_risk_of_bias': risk,
                  } if rhodiola else None,
              }
          except Exception as error:
              report = {
                  'ok': False,
                  'scopeOk': False,
                  'formsOk': False,
                  'riskOfBiasOk': False,
                  'changedHerbs': [],
                  'changedCompounds': [],
                  'error': str(error),
                  'traceback': traceback.format_exc(),
              }

          report_path.write_text(json.dumps(report, indent=2) + '\n')
          print(json.dumps(report, indent=2))
          PY

      - name: Upload semantic comparison report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rhodiola-generated-semantic-audit
          path: rhodiola-generated-semantic-audit.json
          if-no-files-found: error

      - name: Enforce generated-record scope
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('rhodiola-generated-semantic-audit.json').read_text())
          if not report.get('ok'):
              raise SystemExit(
                  'semantic export audit failed: ' + json.dumps({
                      'changedHerbs': report.get('changedHerbs'),
                      'changedCompounds': report.get('changedCompounds'),
                      'formsOk': report.get('formsOk'),
                      'riskOfBiasOk': report.get('riskOfBiasOk'),
                      'error': report.get('error'),
                  })
              )
          PY
