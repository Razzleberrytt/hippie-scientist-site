name: Workbook XML Diagnostic

on:
  push:
    branches:
      - repair-new-workbook-namespace-20260710

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update diagnostic comment with OOXML metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Workbook XML diagnostic"
            echo
            echo "### xl/workbook.xml"
            echo '```xml'
            unzip -p data-sources/herb_monograph_master.xlsx xl/workbook.xml | head -c 6000
            echo
            echo '```'
            echo
            echo "### xl/_rels/workbook.xml.rels"
            echo '```xml'
            unzip -p data-sources/herb_monograph_master.xlsx xl/_rels/workbook.xml.rels | head -c 6000
            echo
            echo '```'
          } >/tmp/comment.md
          jq -n --rawfile body /tmp/comment.md '{body: $body}' >/tmp/payload.json
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/4940844313" \
            --input /tmp/payload.json
