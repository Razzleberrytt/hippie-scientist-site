name: Entity Master XML Diagnostic

on:
  push:
    branches:
      - repair-new-workbook-namespace-20260710

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect Entity_Master worksheet XML
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Entity_Master worksheet XML diagnostic"
            echo
            echo '```xml'
            unzip -p data-sources/herb_monograph_master.xlsx xl/worksheets/sheet7.xml | head -c 12000
            echo
            echo '```'
          } >/tmp/comment.md
          jq -n --rawfile body /tmp/comment.md '{body: $body}' >/tmp/payload.json
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/4940844313" \
            --input /tmp/payload.json
