name: Workbook Build Diagnostic

on:
  push:
    branches:
      - repair-new-workbook-namespace-20260710

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Verify newer workbook runtime generation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          node --trace-uncaught --enable-source-maps scripts/data/build-runtime-from-workbook.mjs --out /tmp/workbook-output >/tmp/workbook.log 2>&1
          status=$?
          set -e
          {
            echo "## Repaired newer workbook diagnostic"
            echo
            echo "Exit code: ${status}"
            echo
            echo '```text'
            tail -n 160 /tmp/workbook.log
            echo '```'
          } >/tmp/comment.md
          jq -n --rawfile body /tmp/comment.md '{body: $body}' >/tmp/payload.json
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/4940844313" \
            --input /tmp/payload.json
          exit "$status"
