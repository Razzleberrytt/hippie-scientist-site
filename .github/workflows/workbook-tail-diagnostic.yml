name: Workbook Parser Diagnostic

on:
  push:
    branches:
      - repair-new-workbook-namespace-20260710

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --silent
      - name: Inspect resolved sheets and Entity_Master rows
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node --input-type=module <<'NODE' >/tmp/workbook.log 2>&1
          import { readWorkbookExcelJS } from './scripts/utils/read-workbook-exceljs.mjs'
          const workbook = await readWorkbookExcelJS('./data-sources/herb_monograph_master.xlsx')
          const names = workbook.getSheetNames()
          console.log('sheetNames:', JSON.stringify(names))
          for (const name of ['Entity_Master', 'Evidence_Register', 'Entity_Relationships']) {
            const rows = workbook.getSheetData(name)
            console.log(`${name} rows:`, rows.length)
            console.log(`${name} first keys:`, JSON.stringify(Object.keys(rows[0] || {})))
            console.log(`${name} first sample:`, JSON.stringify(rows[0] || null).slice(0, 2000))
          }
          NODE
          {
            echo "## Workbook parser diagnostic"
            echo
            echo '```text'
            cat /tmp/workbook.log
            echo '```'
          } >/tmp/comment.md
          jq -n --rawfile body /tmp/comment.md '{body: $body}' >/tmp/payload.json
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/4940844313" \
            --input /tmp/payload.json
