name: Apply Reviewed NAC Patch

on:
  push:
    branches:
      - patch/n-acetylcysteine-reviewable

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: patch/n-acetylcysteine-reviewable
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize exact reviewed NAC patch
        run: |
          rm -rf data/patches/normalized
          mkdir -p data/patches/normalized
          npm run data:normalize-patch -- --file data/patches/inbox/n-acetylcysteine-scite-enrichment-2026-07-12.json | tee /tmp/nac-normalize.log
          NORMALIZED=$(find data/patches/normalized -maxdepth 1 -type f -name '*.json' ! -name '*.report.json' | head -n 1)
          test -n "$NORMALIZED"
          echo "NORMALIZED_FILE=$NORMALIZED" >> "$GITHUB_ENV"

      - name: Assert isolated NAC target and scope
        run: |
          node <<'NODE'
          const fs = require('fs')
          const patch = JSON.parse(fs.readFileSync(process.env.NORMALIZED_FILE, 'utf8'))
          const expectedId = 'scite-n-acetylcysteine-evidence-2026-07-12-001'
          if (patch.patch_id !== expectedId) throw new Error(`unexpected patch id: ${patch.patch_id}`)
          if (patch.target?.slug !== 'n-acetylcysteine' || patch.target?.entity_type !== 'compound') {
            throw new Error(`unexpected target: ${JSON.stringify(patch.target)}`)
          }
          if (patch.operations?.length !== 6 || patch.sources?.length !== 7) {
            throw new Error(`unexpected patch scope: ${patch.operations?.length} ops, ${patch.sources?.length} sources`)
          }
          const fields = patch.operations.map((operation) => operation.field).filter(Boolean)
          if (fields.some((field) => field.startsWith('legacy.legacy.') || field.startsWith('data.data.'))) {
            throw new Error(`double-prefixed canonical field: ${fields.join(', ')}`)
          }
          for (const required of ['description', 'data.dosage', 'data.safety_notes', 'legacy.evidence_risk_of_bias']) {
            if (!fields.includes(required)) throw new Error(`missing required field: ${required}`)
          }
          NODE

      - name: Repeat exact-file dry run
        run: npm run data:patches:dry-run -- --file "$NORMALIZED_FILE" | tee /tmp/nac-dry-run.log

      - name: Apply exact NAC patch without broad parity export
        run: npm run data:patches:apply -- --file "$NORMALIZED_FILE" --no-rebuild | tee /tmp/nac-apply.log

      - name: Validate canonical transaction
        run: |
          npm run data:canonical:validate
          npm run data:build-db
          node scripts/data/canonical/__tests__/graph-smoke.mjs

      - name: Verify archive and clean inbox
        run: |
          test -f data/patches/applied/scite-n-acetylcysteine-evidence-2026-07-12-001.json
          rm data/patches/inbox/n-acetylcysteine-scite-enrichment-2026-07-12.json
          test ! -e data/patches/inbox/n-acetylcysteine-scite-enrichment-2026-07-12.json

      - name: Remove one-time workflows and commit canonical transaction
        run: |
          rm .github/workflows/nac-patch-apply.yml
          rm .github/workflows/nac-patch-dry-run.yml
          if [ ! -e data/patches/normalized/.gitkeep ]; then
            mkdir -p data/patches/normalized
            : > data/patches/normalized/.gitkeep
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "data: apply Scite-grounded NAC evidence patch"
          git push origin HEAD:patch/n-acetylcysteine-reviewable
