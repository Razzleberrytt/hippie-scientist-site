name: Monthly data sync

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync updated datasets into public/data
        run: node scripts/sync-updated-datasets.mjs

      - name: Report missing core fields
        run: |
          npm run data:missing > missing-fields-report.json
          cat missing-fields-report.json >> $GITHUB_STEP_SUMMARY

      - name: Commit and push if changed
        run: |
          git config user.name "hippie-scientist-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/herbs.json public/data/compounds.json
          git diff --cached --quiet && echo "No data changes to commit" || (git commit -m "chore(data): monthly dataset sync" && git push)
