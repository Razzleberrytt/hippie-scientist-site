name: Apply Approved Citicoline Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/workbook-patch-check.yml'
  workflow_dispatch:

concurrency:
  group: apply-citicoline-patch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    name: Apply and verify Citicoline patch
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --silent

      - name: Validate approved patch before writing
        run: |
          npm run check:node --silent
          node scripts/data/apply-workbook-patch.mjs \
            --patch data-sources/workbook-patches/citicoline-scite-pilot.json

      - name: Apply patch atomically
        run: |
          node scripts/data/apply-workbook-patch.mjs \
            --patch data-sources/workbook-patches/citicoline-scite-pilot.json \
            --apply \
            --approve-human-review \
            --in-place

      - name: Mark patch applied
        shell: bash
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          path = Path('data-sources/workbook-patches/citicoline-scite-pilot.json')
          patch = json.loads(path.read_text())
          if patch.get('status') != 'approved':
              raise SystemExit(f"Expected approved status before marking applied; found {patch.get('status')!r}")
          patch['status'] = 'applied'
          patch['applied_at'] = '2026-07-12'
          patch['applied_by'] = 'Willie Randolph'
          path.write_text(json.dumps(patch, indent=2, ensure_ascii=False) + '\n')
          PY

      - name: Rebuild and verify canonical outputs
        run: |
          npm run workbook:roundtrip-test --silent
          npm run data:build:core --silent
          npm run guard:source-of-truth --silent
          npm run validate:evidence-language --silent
          node scripts/ci/validate-workbook-patches.mjs

      - name: Enforce narrow change boundary
        shell: bash
        run: |
          python <<'PY'
          import subprocess

          output = subprocess.check_output(
              ['git', 'status', '--porcelain=v1'],
              text=True,
          )
          paths = []
          for line in output.splitlines():
              if not line.strip():
                  continue
              path = line[3:]
              if ' -> ' in path:
                  path = path.split(' -> ', 1)[1]
              paths.append(path)

          allowed_exact = {
              'data-sources/herb_monograph_master.xlsx',
              'data-sources/workbook-patches/citicoline-scite-pilot.json',
          }
          unexpected = [
              path for path in paths
              if path not in allowed_exact and not path.startswith('public/data/')
          ]
          if unexpected:
              raise SystemExit('Unexpected changed paths:\n- ' + '\n- '.join(unexpected))
          if len(paths) > 50:
              raise SystemExit(f'Refusing broad patch: {len(paths)} changed paths exceeds the 50-file boundary')
          print(f'Validated narrow patch boundary: {len(paths)} changed path(s)')
          for path in paths:
              print(f'- {path}')
          PY
          git diff --check
          git diff --stat

      - name: Commit applied patch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data-sources/herb_monograph_master.xlsx \
            data-sources/workbook-patches/citicoline-scite-pilot.json \
            public/data
          git diff --cached --check
          git commit -m 'data: apply approved Citicoline evidence patch'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
