name: Workbook Patch Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/workbook-patch-check.yml'
  workflow_dispatch:

concurrency:
  group: workbook-patch-repair-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  repair:
    name: Repair workbook patch runner
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 2
          show-progress: false

      - name: Apply surgical repair
        id: repair
        shell: bash
        run: |
          set +e
          python <<'PY' > repair-diagnostic.txt 2>&1
          from pathlib import Path
          script_path = Path('.github/scripts/repair-workbook-patch.py')
          source = script_path.read_text()
          source = source.replace(
              "\"\"\"      '--workbook', currentInput,\n      '--slug', change.slug,\"\"\"",
              "\"\"\"        '--workbook', currentInput,\n        '--slug', change.slug,\"\"\"",
              1,
          )
          source = source.replace(
              "\"\"\"      '--workbook', currentInput,\n      '--sheet', entitySheet,\n      '--slug', change.slug,\"\"\"",
              "\"\"\"        '--workbook', currentInput,\n        '--sheet', entitySheet,\n        '--slug', change.slug,\"\"\"",
              1,
          )
          source = source.replace(
              "    count = text.count(old)\n",
              "    count = text.count(old)\n    if count == 0 and label == 'editor: usage':\n        old = old.replace('\\n', '\\\\n')\n        new = new.replace('\\n', '\\\\n')\n        count = text.count(old)\n    print(f'{label}: matches={count}', flush=True)\n",
              1,
          )
          exec(compile(source, str(script_path), 'exec'))
          PY
          status=$?
          cat repair-diagnostic.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload repair diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workbook-patch-repair-diagnostic
          path: repair-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

      - name: Check repaired scripts
        if: steps.repair.outputs.status == '0'
        run: |
          node --check scripts/data/apply-workbook-patch.mjs
          node --check scripts/data/edit-entity-master-cell.mjs

      - name: Commit repair and restore normal validation
        if: steps.repair.outputs.status == '0'
        shell: bash
        run: |
          git checkout HEAD^ -- .github/workflows/workbook-patch-check.yml
          git rm .github/workflows/repair-workbook-patch-runner.yml
          git rm .github/scripts/repair-workbook-patch.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/data/apply-workbook-patch.mjs scripts/data/edit-entity-master-cell.mjs
          git diff --cached --check
          git commit -m 'fix: make workbook patches use resolved entity sheet'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Enforce repair result
        if: steps.repair.outputs.status != '0'
        run: exit 1
