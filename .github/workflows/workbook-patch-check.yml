name: Resolve Workbook Patch Conflicts

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/workbook-patch-check.yml'
  workflow_dispatch:

concurrency:
  group: resolve-workbook-patch-conflicts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  resolve:
    name: Merge main and regenerate workbook data
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --silent

      - name: Merge current main with guarded conflict policy
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main

          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
          if (( ${#conflicts[@]} > 0 )); then
            printf 'Detected conflicts:\n'
            printf -- '- %s\n' "${conflicts[@]}"
          fi

          unexpected=()
          for file in "${conflicts[@]}"; do
            case "$file" in
              public/data/*)
                # Generated outputs are rebuilt below from the merged code and applied workbook.
                git checkout --theirs -- "$file"
                git add -- "$file"
                ;;
              data-sources/herb_monograph_master.xlsx|data-sources/workbook-patches/*|scripts/ci/validate-workbook-patches.mjs|scripts/data/apply-workbook-patch.mjs|scripts/data/edit-entity-master-cell.mjs|.github/workflows/workbook-patch-check.yml)
                # Preserve the reviewed workbook patch implementation and applied workbook.
                git checkout --ours -- "$file"
                git add -- "$file"
                ;;
              *)
                unexpected+=("$file")
                ;;
            esac
          done

          if (( ${#unexpected[@]} > 0 )); then
            printf 'Refusing to guess on unexpected conflicts:\n'
            printf -- '- %s\n' "${unexpected[@]}"
            exit 1
          fi

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo 'Unresolved conflicts remain.'
            git diff --name-only --diff-filter=U
            exit 1
          fi

          if (( merge_status != 0 )) && (( ${#conflicts[@]} == 0 )); then
            echo "Merge failed without file conflicts (status $merge_status)."
            exit "$merge_status"
          fi

      - name: Validate applied Citicoline record
        run: |
          npm run check:node --silent
          npm run validate:workbook-schema --silent
          node scripts/ci/validate-workbook-patches.mjs

      - name: Rebuild generated data from merged code and workbook
        run: |
          npm run data:build --silent
          npm run guard:source-of-truth --silent
          npm run validate:evidence-language --silent
          npm run data:verify --silent

      - name: Confirm Citicoline runtime values
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const compounds = JSON.parse(fs.readFileSync('public/data/compounds.json', 'utf8'))
          const citicoline = compounds.find((entry) => entry.slug === 'citicoline')
          if (!citicoline) throw new Error('Citicoline is missing from public/data/compounds.json')
          const expectedSummary = 'Small randomized trials in selected older adults suggest possible short-term improvements in memory'
          if (!String(citicoline.summary || '').includes(expectedSummary)) {
            throw new Error('Citicoline runtime summary does not contain the applied evidence update')
          }
          if (!String(citicoline.dosage || citicoline.typical_dosage || '').includes('500 mg/day')) {
            throw new Error('Citicoline runtime dosage does not contain the applied 500 mg/day study regimen')
          }
          console.log('Citicoline runtime values confirmed.')
          NODE

      - name: Enforce merge scope and commit
        shell: bash
        run: |
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo 'Unresolved conflicts remain before commit.'
            exit 1
          fi

          git add -A
          git diff --cached --check
          git status --short
          git commit -m 'Merge main and resolve workbook patch conflicts'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
