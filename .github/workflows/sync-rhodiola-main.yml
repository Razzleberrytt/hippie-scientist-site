name: Sync Rhodiola Patch Branch

on:
  push:
    branches:
      - patch/rhodiola-reviewable-v2

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: patch/rhodiola-reviewable-v2
          fetch-depth: 0

      - name: Merge current main and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm .github/workflows/sync-rhodiola-main.yml
          git add .github/workflows/sync-rhodiola-main.yml
          git commit -m "chore: remove one-time Rhodiola branch sync"
          git push origin HEAD:patch/rhodiola-reviewable-v2
