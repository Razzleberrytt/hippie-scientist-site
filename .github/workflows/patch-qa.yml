name: Patch QA Audit

on:
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --prefer-offline --no-audit
      - run: node scripts/review-patches.mjs || true
