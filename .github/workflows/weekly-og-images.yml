name: Weekly OG Images

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 4am UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate OG images
        run: npm run og

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/og src/data/og-manifest.json
          git diff --cached --quiet && echo "No new OG images" || \
            (git commit -m "chore(og): weekly OG image refresh" && git push)

      - name: Trigger Netlify deploy
        if: success()
        env:
          NETLIFY_DEPLOY_HOOK_URL: ${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_DEPLOY_HOOK_URL" ]; then exit 0; fi
          curl -s -X POST "$NETLIFY_DEPLOY_HOOK_URL"
