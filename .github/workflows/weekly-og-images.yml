name: Weekly OG Images

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-og:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run og -- --skip-existing

      - name: Commit updated OG images
        run: |
          if git diff --quiet -- public/og src/data/og-manifest.json; then
            echo "No OG image changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/og src/data/og-manifest.json
          git commit -m "chore(og): refresh generated OG images"
          git push
