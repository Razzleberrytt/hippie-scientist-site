name: Apply Rhodiola Scite Patch Once

on:
  push:
    branches:
      - scite-rhodiola-enrichment-20260712
    paths:
      - '.github/workflows/apply-rhodiola-scite-patch-once.yml'
      - 'data/patches/inbox/rhodiola-scite-enrichment-2026-07-12.json'

permissions:
  contents: write

concurrency:
  group: apply-rhodiola-scite-patch-once
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[rhodiola patch applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: scite-rhodiola-enrichment-20260712
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --silent

      - name: Normalize GPT patch inbox
        run: npm run data:normalize-inbox

      - name: Review normalized patch
        run: npm run data:review-patches -- --file data/patches/normalized/scite-rhodiola-evidence-2026-07-12-001.json

      - name: Preview only the Rhodiola transactional diff
        run: npm run data:patches:dry-run -- --file data/patches/normalized/scite-rhodiola-evidence-2026-07-12-001.json

      - name: Apply only the Rhodiola patch with snapshot and audit log
        run: npm run data:patches:apply -- --file data/patches/normalized/scite-rhodiola-evidence-2026-07-12-001.json

      - name: Validate canonical data, graph, export, and freshness
        run: npm run data:ci

      - name: Remove one-time execution inputs
        run: |
          rm -f data/patches/inbox/rhodiola-scite-enrichment-2026-07-12.json
          rm -f .github/workflows/apply-rhodiola-scite-patch-once.yml

      - name: Verify scope and commit audited changes
        run: |
          test -f data/patches/applied/scite-rhodiola-evidence-2026-07-12-001.json
          git diff --name-only origin/main...HEAD > /tmp/preexisting.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'data: apply isolated Scite-grounded Rhodiola enrichment [rhodiola patch applied]'
          git push origin HEAD:scite-rhodiola-enrichment-20260712
