name: Apply Glycine Review

on:
  push:
    branches:
      - data/glycine-evidence-review

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/glycine-evidence-review
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run evidence:finalize -- --slug=glycine --apply
      - run: npm run evidence:check
      - run: |
          node <<'NODE'
          const fs = require('fs')
          const record = JSON.parse(fs.readFileSync('public/data/compounds-detail/glycine.json', 'utf8'))
          if (record.claimMap?.length !== 6) throw new Error(`Expected 6 claims, found ${record.claimMap?.length}`)
          if (record.sources?.length !== 4) throw new Error(`Expected 4 sources, found ${record.sources?.length}`)
          if (record.evidence?.reviewStatus !== 'sourced') throw new Error(`Expected sourced, found ${record.evidence?.reviewStatus}`)
          console.log({ claims: record.claimMap.length, sources: record.sources.length, status: record.evidence.reviewStatus })
          NODE
      - run: |
          rm -f data/reviews/evidence/.glycine-trigger
          rm .github/workflows/apply-glycine-review.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "data: finalize glycine evidence profile"
          git push origin HEAD:data/glycine-evidence-review
