name: Apply Citicoline Workbook Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - 'data-sources/workbook-patches/citicoline-scite-pilot.json'
      - 'data-sources/herb_monograph_master.xlsx'
      - '.github/workflows/apply-citicoline-workbook-patch.yml'

concurrency:
  group: apply-citicoline-workbook-patch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --silent

      - name: Confirm approved patch
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const file = 'data-sources/workbook-patches/citicoline-scite-pilot.json'
          const patch = JSON.parse(fs.readFileSync(file, 'utf8'))
          if (patch.status !== 'approved') {
            throw new Error(`Expected approved patch, found ${patch.status}`)
          }
          NODE

      - name: Apply reviewed workbook cells
        run: |
          node scripts/data/apply-workbook-patch.mjs \
            --patch data-sources/workbook-patches/citicoline-scite-pilot.json \
            --apply \
            --approve-human-review \
            --in-place

      - name: Mark patch applied
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const file = 'data-sources/workbook-patches/citicoline-scite-pilot.json'
          const patch = JSON.parse(fs.readFileSync(file, 'utf8'))
          patch.status = 'applied'
          patch.applied_at = '2026-07-10'
          patch.applied_by = 'GitHub Actions reviewed patch runner'
          fs.writeFileSync(file, `${JSON.stringify(patch, null, 2)}\n`, 'utf8')
          NODE

      - name: Verify applied values and workbook schema
        run: |
          npm run validate:workbook-schema --silent
          node scripts/ci/validate-workbook-patches.mjs
          npm run workbook:roundtrip-test --silent

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          rm .github/workflows/apply-citicoline-workbook-patch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data-sources/herb_monograph_master.xlsx \
                  data-sources/workbook-patches/citicoline-scite-pilot.json \
                  .github/workflows/apply-citicoline-workbook-patch.yml
          git commit -m 'data: apply reviewed Citicoline workbook patch'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
