name: Site Health Check

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install deps
        run: npm ci

      - name: Verify Node engine
        run: npm run check:node

      - name: Run full check
        run: |
          set +e
          npm run check:full 2>&1 | tee site-health-output.log
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Upload Site Health diagnostic output
        if: always() && hashFiles('site-health-output.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: site-health-output
          path: site-health-output.log
          if-no-files-found: ignore
