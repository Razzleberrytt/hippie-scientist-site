name: Repair workbook patch runner

on:
  push:
    paths:
      - '.github/workflows/repair-workbook-patch-runner.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply surgical repair
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          apply_path = Path('scripts/data/apply-workbook-patch.mjs')
          text = apply_path.read_text()

          text = replace_once(
              text,
              "const ENTITY_SHEET = 'Entity_Master'",
              "const ENTITY_SHEET_CANDIDATES = ['Entity_Master', 'Sheet7', 'Herb Master V3']",
              'apply: entity candidates',
          )

          text = replace_once(
              text,
              """async function loadEntityRows(workbookPath) {
            if (!fs.existsSync(workbookPath)) throw new Error(`Workbook not found: ${workbookPath}`)
            const workbook = await readWorkbookExcelJS(workbookPath)
            const sheetNames = workbook.getSheetNames()
            if (!sheetNames.includes(ENTITY_SHEET)) {
              throw new Error(`Workbook is missing required sheet ${ENTITY_SHEET}`)
            }
            return workbook.getSheetData(ENTITY_SHEET)
          }""",
              """async function loadEntityRows(workbookPath) {
            if (!fs.existsSync(workbookPath)) throw new Error(`Workbook not found: ${workbookPath}`)
            const workbook = await readWorkbookExcelJS(workbookPath)
            const sheetNames = workbook.getSheetNames()
            const entitySheet = ENTITY_SHEET_CANDIDATES.find((name) => sheetNames.includes(name))
            if (!entitySheet) {
              throw new Error(
                `Workbook is missing required entity sheet. Looked for: ${ENTITY_SHEET_CANDIDATES.join(', ')}. ` +
                `Present: ${sheetNames.join(', ')}`,
              )
            }
            return { entitySheet, rows: workbook.getSheetData(entitySheet) }
          }""",
              'apply: load entity rows',
          )

          text = replace_once(
              text,
              'function validateAgainstWorkbook(patch, rows, patchPath) {',
              'function validateAgainstWorkbook(patch, rows, patchPath, entitySheet) {',
              'apply: validator signature',
          )

          text = replace_once(
              text,
              'throw new Error(`${patchPath}: changes[${index}] column ${column} does not exist in ${ENTITY_SHEET}`)',
              'throw new Error(`${patchPath}: changes[${index}] column ${column} does not exist in ${entitySheet}`)',
              'apply: sheet-aware column error',
          )

          text = replace_once(
              text,
              'function applyPatch({ patch, changes, workbookPath, outPath, inPlace, approveHumanReview }) {',
              'function applyPatch({ patch, changes, workbookPath, outPath, inPlace, approveHumanReview, entitySheet }) {',
              'apply: apply signature',
          )

          text = replace_once(
              text,
              """        '--workbook', currentInput,
                  '--slug', change.slug,""",
              """        '--workbook', currentInput,
                  '--sheet', entitySheet,
                  '--slug', change.slug,""",
              'apply: pass resolved sheet',
          )

          text = replace_once(
              text,
              """    const schemaOutput = runNode(SCHEMA_VALIDATOR, [], {
                  env: { ...process.env, HERB_XLSX_PATH: finalPath },
                })""",
              """    const schemaOutput = runNode(SCHEMA_VALIDATOR, [], {
                  env: {
                    ...process.env,
                    HERB_XLSX_PATH: finalPath,
                    ...(inPlace ? {} : { ALLOW_EXTERNAL_WORKBOOK_PATH: 'true' }),
                  },
                })""",
              'apply: external review validation',
          )

          text = replace_once(
              text,
              """  const rows = await loadEntityRows(workbookPath)
            const changes = validateAgainstWorkbook(patch, rows, patchPath)""",
              """  const { entitySheet, rows } = await loadEntityRows(workbookPath)
            const changes = validateAgainstWorkbook(patch, rows, patchPath, entitySheet)""",
              'apply: resolved sheet in main',
          )

          text = replace_once(
              text,
              """    approveHumanReview: args.approveHumanReview,
              })""",
              """    approveHumanReview: args.approveHumanReview,
                entitySheet,
              })""",
              'apply: pass sheet to apply',
          )

          if 'ENTITY_SHEET' in text and 'ENTITY_SHEET_CANDIDATES' not in text:
              raise SystemExit('apply: unexpected unresolved entity sheet reference')
          apply_path.write_text(text)

          editor_path = Path('scripts/data/edit-entity-master-cell.mjs')
          text = editor_path.read_text()

          text = replace_once(
              text,
              "const ENTITY_SHEET_NAME = 'Entity_Master'",
              "const ENTITY_SHEET_CANDIDATES = ['Entity_Master', 'Sheet7', 'Herb Master V3']",
              'editor: entity candidates',
          )

          text = replace_once(
              text,
              """  --workbook <path>  Workbook path. Default: ${DEFAULT_WORKBOOK}
            --slug <slug>      Entity_Master slug to edit. Required unless --roundtrip is used.""",
              """  --workbook <path>  Workbook path. Default: ${DEFAULT_WORKBOOK}
            --sheet <name>     Entity sheet name. Defaults to the first supported sheet present.
            --slug <slug>      Entity sheet slug to edit. Required unless --roundtrip is used.""",
              'editor: usage',
          )

          text = replace_once(
              text,
              """    workbook: DEFAULT_WORKBOOK,
                slug: '',""",
              """    workbook: DEFAULT_WORKBOOK,
                sheet: '',
                slug: '',""",
              'editor: args sheet',
          )

          text = replace_once(
              text,
              """      case '--workbook':
                    args.workbook = nextValue()
                    break
                  case '--slug':""",
              """      case '--workbook':
                    args.workbook = nextValue()
                    break
                  case '--sheet':
                    args.sheet = nextValue()
                    break
                  case '--slug':""",
              'editor: parse sheet',
          )

          text = replace_once(
              text,
              """function locateEntityMasterWorksheet(entryMap) {
            const workbookXml = getXml(entryMap, 'xl/workbook.xml')
            const rels = parseRelationships(getXml(entryMap, 'xl/_rels/workbook.xml.rels'))

            for (const sheetMatch of workbookXml.matchAll(/<sheet\\b[^>]*>/g)) {
              const tag = sheetMatch[0]
              if (getAttribute(tag, 'name') !== ENTITY_SHEET_NAME) continue
              const relId = getAttribute(tag, 'r:id')
              const target = rels.get(relId)
              if (!target) fail(`${ENTITY_SHEET_NAME} references missing relationship ${relId}`)
              const normalized = target.startsWith('/') ? target.slice(1) : target.startsWith('xl/') ? target : `xl/${target}`
              if (!entryMap.has(normalized)) fail(`${ENTITY_SHEET_NAME} points to missing worksheet part: ${normalized}`)
              return normalized
            }

            fail(`Workbook sheet ${ENTITY_SHEET_NAME} is missing`)
          }""",
              """function locateEntityMasterWorksheet(entryMap, requestedSheet = '') {
            const workbookXml = getXml(entryMap, 'xl/workbook.xml')
            const rels = parseRelationships(getXml(entryMap, 'xl/_rels/workbook.xml.rels'))
            const sheets = [...workbookXml.matchAll(/<sheet\\b[^>]*>/g)].map((sheetMatch) => {
              const tag = sheetMatch[0]
              return { name: getAttribute(tag, 'name'), relId: getAttribute(tag, 'r:id') }
            })
            const candidates = requestedSheet ? [requestedSheet] : ENTITY_SHEET_CANDIDATES
            const resolved = candidates.map((candidate) => sheets.find((sheet) => sheet.name === candidate)).find(Boolean)

            if (!resolved) {
              fail(`Workbook entity sheet is missing. Looked for: ${candidates.join(', ')}. Present: ${sheets.map((sheet) => sheet.name).join(', ')}`)
            }

            const target = rels.get(resolved.relId)
            if (!target) fail(`${resolved.name} references missing relationship ${resolved.relId}`)
            const worksheetPath = target.startsWith('/') ? target.slice(1) : target.startsWith('xl/') ? target : `xl/${target}`
            if (!entryMap.has(worksheetPath)) fail(`${resolved.name} points to missing worksheet part: ${worksheetPath}`)
            return { sheetName: resolved.name, worksheetPath }
          }""",
              'editor: sheet resolver',
          )

          text = replace_once(
              text,
              'function getHeaderMap(rows) {',
              'function getHeaderMap(rows, sheetName) {',
              'editor: header signature',
          )
          text = replace_once(
              text,
              'if (!headerRow) fail(`${ENTITY_SHEET_NAME} is missing header row 1`)',
              'if (!headerRow) fail(`${sheetName} is missing header row 1`)',
              'editor: header error',
          )

          text = replace_once(
              text,
              'function findTargetRow(rows, slugColumn, wantedSlug) {',
              'function findTargetRow(rows, slugColumn, wantedSlug, sheetName) {',
              'editor: row finder signature',
          )
          text = replace_once(
              text,
              'if (matches.length === 0) fail(`Slug not found in ${ENTITY_SHEET_NAME}: ${wantedSlug}`)',
              'if (matches.length === 0) fail(`Slug not found in ${sheetName}: ${wantedSlug}`)',
              'editor: slug missing',
          )
          text = replace_once(
              text,
              'if (matches.length > 1) fail(`Duplicate slug in ${ENTITY_SHEET_NAME}: ${wantedSlug} appears on rows ${matches.map((row) => row.rowNumber).join(\', \')}`)',
              'if (matches.length > 1) fail(`Duplicate slug in ${sheetName}: ${wantedSlug} appears on rows ${matches.map((row) => row.rowNumber).join(\', \')}`)',
              'editor: duplicate slug',
          )

          text = replace_once(
              text,
              'function editCell({ workbookPath, slug, column, value, dryRun }) {',
              'function editCell({ workbookPath, sheet, slug, column, value, dryRun }) {',
              'editor: edit signature',
          )
          text = replace_once(
              text,
              'const worksheetPath = locateEntityMasterWorksheet(entryMap)',
              'const { sheetName, worksheetPath } = locateEntityMasterWorksheet(entryMap, sheet)',
              'editor: resolved worksheet',
          )
          text = replace_once(
              text,
              'const headers = getHeaderMap(rows)',
              'const headers = getHeaderMap(rows, sheetName)',
              'editor: header call',
          )
          text = replace_once(
              text,
              'if (!slugColumn) fail(`${ENTITY_SHEET_NAME} is missing required slug column`)',
              'if (!slugColumn) fail(`${sheetName} is missing required slug column`)',
              'editor: slug column error',
          )
          text = replace_once(
              text,
              'if (!targetColumn) fail(`${ENTITY_SHEET_NAME} is missing target column: ${normalizedColumn}`)',
              'if (!targetColumn) fail(`${sheetName} is missing target column: ${normalizedColumn}`)',
              'editor: target column error',
          )
          text = replace_once(
              text,
              'const targetRow = findTargetRow(rows, slugColumn, wantedSlug)',
              'const targetRow = findTargetRow(rows, slugColumn, wantedSlug, sheetName)',
              'editor: row finder call',
          )
          text = replace_once(
              text,
              'sheet: ENTITY_SHEET_NAME,',
              'sheet: sheetName,',
              'editor: report sheet',
          )

          text = replace_once(
              text,
              """    workbookPath,
                slug: args.slug,""",
              """    workbookPath,
                sheet: args.sheet,
                slug: args.slug,""",
              'editor: main sheet',
          )

          if 'ENTITY_SHEET_NAME' in text:
              raise SystemExit('editor: unresolved ENTITY_SHEET_NAME reference')
          editor_path.write_text(text)
          PY

      - name: Check repaired scripts
        run: |
          node --check scripts/data/apply-workbook-patch.mjs
          node --check scripts/data/edit-entity-master-cell.mjs

      - name: Commit repair and remove one-time workflow
        shell: bash
        run: |
          git rm .github/workflows/repair-workbook-patch-runner.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/data/apply-workbook-patch.mjs scripts/data/edit-entity-master-cell.mjs
          git commit -m 'fix: make workbook patches use resolved entity sheet'
          git push origin HEAD:${GITHUB_REF_NAME}
