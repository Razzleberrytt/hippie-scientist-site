name: Replay Editorial Design V2

on:
  push:
    branches:
      - design/editorial-botanical-refresh-v2

permissions:
  contents: write

jobs:
  replay:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/editorial-botanical-refresh-v2
          fetch-depth: 0

      - name: Replay validated visual-system commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git cherry-pick 3e866e569dcdb688a0d9f9ab4be80437db12443c
          git cherry-pick 1a420574d0390029ac47f081e32d4145fb9d6068
          git cherry-pick 12cf5f0a885de1adfff772cc4eae32a290d3d960
          git cherry-pick 9816c23b3eae56af8f5b62345ccde990e1fff3c5
          git cherry-pick 339991c6a6638c2711520a7343a7c2ae1e2c3db7
          git cherry-pick f2c6a8f98664d555700e5124be1eb651d4263bf4
          git cherry-pick 99fa582f3f1a8bf6b8a58194890102d25f95338f
          if ! git cherry-pick 4c76c8aedb56af05c87c7ac5cd69388c091b0751; then
            git checkout --theirs src/components/InteractionWarnings.tsx
            git add src/components/InteractionWarnings.tsx
            GIT_EDITOR=true git cherry-pick --continue
          fi
          git cherry-pick 8bbc310549e1cd5948a3b1b4f3e7c3475be1d849
          git cherry-pick 50b9ffd00a4e5374f9cd09a70826c30204760e49

      - name: Remove temporary files
        run: |
          rm -f styles/.editorial-v2-trigger
          rm .github/workflows/replay-editorial-design-v2.yml
          git add -A
          git commit -m "chore: remove editorial replay helper"

      - name: Push refreshed design branch
        run: git push origin HEAD:design/editorial-botanical-refresh-v2
