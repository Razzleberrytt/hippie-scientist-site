name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify redirects
        run: npm run verify:redirects

      - name: Trigger Netlify deploy hook
        if: ${{ secrets.NETLIFY_DEPLOY_HOOK_URL != '' }}
        run: curl -X POST "${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}"
