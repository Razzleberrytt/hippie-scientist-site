name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enrichment release gate
        run: npm run enrichment:release:gate

      - name: Verify SPA redirects
        run: npm run verify:redirects

      - name: Trigger Netlify deploy hook (if configured)
        env:
          NETLIFY_DEPLOY_HOOK_URL: ${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$NETLIFY_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$NETLIFY_DEPLOY_HOOK_URL"
            echo "Triggered Netlify deploy hook."
          else
            echo "NETLIFY_DEPLOY_HOOK_URL not set; skipping deploy hook trigger."
          fi
