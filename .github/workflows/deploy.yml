name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enrichment release gate
        run: npm run enrichment:release:gate

      - name: Build production site (includes prebuild + postbuild)
        run: npm run build

      - name: Verify SPA redirects
        run: npm run verify:redirects

      - name: Verify critical generated assets
        run: |
          required_files=(
            "public/data/herbs.json"
            "public/data/compounds.json"
            "public/data/indexable-herbs.json"
            "dist/index.html"
            "dist/sitemap.xml"
            "dist/robots.txt"
            "dist/_redirects"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "[deploy] Missing required generated asset: $file"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "[deploy] Critical generated assets are missing. Failing before deploy."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_PAGES_PROJECT" ]; then
            echo "[deploy] Missing required Cloudflare secrets (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_PAGES_PROJECT)."
            exit 1
          fi

          npx wrangler@4 pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$GITHUB_REF_NAME"
