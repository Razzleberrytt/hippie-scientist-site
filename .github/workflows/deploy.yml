name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Enrichment release gate
        run: npm run enrichment:release:gate

      - name: Decode workbook from HERB_WORKBOOK_B64 secret
        env:
          HERB_WORKBOOK_B64: ${{ secrets.HERB_WORKBOOK_B64 }}
        run: |
          if [ -z "$HERB_WORKBOOK_B64" ]; then
            echo "::warning::HERB_WORKBOOK_B64 secret is not set. Using workbook committed in data-sources/."
            exit 0
          fi

          mkdir -p data-sources
          printf '%s' "$HERB_WORKBOOK_B64" | base64 --decode > data-sources/herb_monograph_master.xlsx
          echo "[deploy] Workbook decoded to data-sources/herb_monograph_master.xlsx"

      - name: Build production site
        run: npm run build

      - name: Generate sitemap + robots for Next public assets
        run: npm run sitemap

      - name: Verify SPA redirects
        run: npm run verify:redirects

      - name: Build Cloudflare Pages output from Next
        run: npx @cloudflare/next-on-pages@1

      - name: Verify critical generated assets
        run: |
          required_paths=(
            "public/data/herbs.json"
            "public/data/compounds.json"
            "public/sitemap.xml"
            "public/robots.txt"
            ".vercel/output/config.json"
            ".vercel/output/static"
          )

          missing=0
          for path in "${required_paths[@]}"; do
            if [ ! -e "$path" ]; then
              echo "[deploy] Missing required generated asset: $path"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "[deploy] Critical generated assets are missing. Failing before deploy."
            exit 1
          fi

      - name: Validate deploy readiness
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: node scripts/ci/validate-deploy-readiness.mjs

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: npx wrangler@4 pages deploy .vercel/output/static --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$GITHUB_REF_NAME"
