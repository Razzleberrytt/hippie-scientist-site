name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Show Node version
        run: node --version

      - name: Show npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify package metadata is unchanged after install
        run: git diff --exit-code package-lock.json package.json

      - name: Verify Node engine
        run: npm run check:node

      - name: Validate workbook source
        run: npm run validate:workbook-source

      - name: Validate static export compatibility
        run: npm run validate:static-export

      - name: Generate route inventory
        run: npm run routes:inventory

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Guard workbook source of truth
        run: npm run guard:source-of-truth

      - name: Build application
        run: npm run build:deploy

      - name: Verify build output
        run: npm run verify:build

      - name: Fail if generated data artifacts are stale
        run: |
          if ! git diff --quiet -- public/data; then
            echo "Generated public/data artifacts are stale. Run 'npm run data:build' and commit the results."
            git diff --stat -- public/data
            exit 1
          fi

      - name: Validate route SEO coverage
        run: npm run validate:route-seo

      - name: Run security audit gate
        run: npm run audit:high

      - name: Generate raw npm audit JSON
        if: always()
        run: npm audit --json > npm-audit.after.json || true

      - name: Upload audit artifact
        if: always() && hashFiles('npm-audit.after.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-after
          path: npm-audit.after.json

      - name: Add workflow summary
        if: always()
        run: |
          echo "## CI quality gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- Purpose: enforce lint, typecheck, workbook/data correctness, build verification, and security audit" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch/ref: $GITHUB_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "- Key commands: npm ci; npm run check:node; npm run validate:workbook-source; npm run validate:static-export; npm run routes:inventory; npm run lint; npm run typecheck; npm run data:build; npm run data:validate; npm run guard:source-of-truth; npm run build:deploy; npm run verify:build; npm run validate:route-seo; npm run audit:high" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: npm-audit-after" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
