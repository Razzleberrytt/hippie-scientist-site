name: codex-post-merge

on:
  pull_request:
    types: [closed]

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  dispatch-next:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch next Codex step
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api             --method POST             repos/${{ github.repository }}/actions/workflows/codex-next.yml/dispatches             -f ref=main             -F inputs[reason]="post-merge from PR #${{ github.event.pull_request.number }}"
