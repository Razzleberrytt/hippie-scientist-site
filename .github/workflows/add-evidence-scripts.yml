name: Wire Evidence Scripts

on:
  push:
    branches:
      - feat/evidence-finalize-workflow

permissions:
  contents: write

jobs:
  wire-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/evidence-finalize-workflow
          fetch-depth: 0

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Add npm scripts
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const file = 'package.json'
          const pkg = JSON.parse(fs.readFileSync(file, 'utf8'))
          pkg.scripts['evidence:finalize'] = 'node scripts/data/finalize-evidence-profile.mjs'
          pkg.scripts['evidence:check'] = 'npx vitest run scripts/data/canonical/__tests__/citation-export.test.mjs scripts/data/canonical/__tests__/evidence-finalize.test.mjs components/ui/__tests__/ShowMeTheStudies.test.tsx && npm run data:canonical:validate && node scripts/ci/validate-evidence-reviews.mjs'
          fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`)
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Run focused evidence checks
        run: npm run evidence:check

      - name: Remove one-time workflow
        run: rm .github/workflows/add-evidence-scripts.yml

      - name: Commit npm scripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json .github/workflows/add-evidence-scripts.yml
          git commit -m "data: wire evidence finalize commands"
          git push origin HEAD:feat/evidence-finalize-workflow
