name: Sync Workbook Compatibility Dependency

on:
  push:
    branches:
      - repair-new-workbook-namespace-20260710

permissions:
  contents: write

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair-new-workbook-namespace-20260710
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Declare jszip and update lockfile
        run: npm install --save-dev --package-lock-only jszip@3.10.1
      - name: Commit lockfile update
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(deps): declare jszip workbook compatibility dependency"
          git push origin HEAD:repair-new-workbook-namespace-20260710
