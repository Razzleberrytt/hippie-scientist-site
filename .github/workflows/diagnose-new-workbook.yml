name: Diagnose New Workbook

on:
  push:
    branches:
      - repair-new-workbook-namespace-20260710

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Post final build failure to PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          git clone --quiet --depth 1 --branch "$GITHUB_REF_NAME" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          npm ci --silent >/tmp/npm-install.log 2>&1
          set +e
          npm run build:deploy >/tmp/build-deploy.log 2>&1
          status=$?
          set -e
          {
            echo "## Temporary workbook diagnostic"
            echo
            echo '```text'
            tail -n 60 /tmp/build-deploy.log
            echo '```'
          } >/tmp/pr-comment.md
          gh pr comment 2162 --repo "$GITHUB_REPOSITORY" --body-file /tmp/pr-comment.md
          exit "$status"
