name: Source Expansion

on:
  workflow_dispatch:

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --prefer-offline --no-audit
      - run: npm run agent:run -- --mode=fast --batch=100 || true
