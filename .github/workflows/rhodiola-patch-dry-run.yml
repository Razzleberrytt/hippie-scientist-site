name: Rhodiola Patch Dry Run

on:
  pull_request:
    branches:
      - main
    paths:
      - data/patches/inbox/rhodiola-scite-enrichment-2026-07-12-v2.json
      - .github/workflows/rhodiola-patch-dry-run.yml

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize exact inbox patch
        run: |
          rm -rf data/patches/normalized
          mkdir -p data/patches/normalized
          npm run data:normalize-patch -- --file data/patches/inbox/rhodiola-scite-enrichment-2026-07-12-v2.json | tee rhodiola-normalize.log
          NORMALIZED=$(find data/patches/normalized -maxdepth 1 -type f -name '*.json' ! -name '*.report.json' | head -n 1)
          test -n "$NORMALIZED"
          echo "NORMALIZED_FILE=$NORMALIZED" >> "$GITHUB_ENV"
          cp "$NORMALIZED" rhodiola-normalized-patch.json

      - name: Dry run exact normalized patch
        run: |
          npm run data:patches:dry-run -- --file "$NORMALIZED_FILE" | tee rhodiola-dry-run.log

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhodiola-patch-dry-run
          path: |
            rhodiola-normalize.log
            rhodiola-dry-run.log
            rhodiola-normalized-patch.json
          if-no-files-found: error
