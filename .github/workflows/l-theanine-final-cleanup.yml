name: L-theanine Final Cleanup

on:
  push:
    branches:
      - cleanup/l-theanine-pilot-final

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: cleanup/l-theanine-pilot-final
          fetch-depth: 0

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Apply reviewed cleanup
        run: node scripts/data/finalize-l-theanine-pilot.mjs

      - name: Remove one-time automation
        run: |
          rm .github/workflows/l-theanine-final-cleanup.yml
          rm scripts/data/finalize-l-theanine-pilot.mjs

      - name: Commit cleanup result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/audit/audit-log.jsonl \
            data/canonical/claims/claims.jsonl \
            data/canonical/sources/sources.jsonl \
            public/data/compounds-detail/l-theanine.json \
            .github/workflows/l-theanine-final-cleanup.yml \
            scripts/data/finalize-l-theanine-pilot.mjs
          git commit -m "data: finalize L-theanine evidence pilot"
          git push origin HEAD:cleanup/l-theanine-pilot-final
