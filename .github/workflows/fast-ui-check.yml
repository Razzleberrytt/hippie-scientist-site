name: Fast UI Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'app/**'
      - 'components/**'
      - 'src/components/**'
      - 'src/lib/**'
      - 'lib/**'
      - 'styles/**'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/fast-ui-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-ui-check:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.[jt]s', 'app/**/*.[jt]sx', 'components/**/*.[jt]s', 'components/**/*.[jt]sx', 'src/**/*.[jt]s', 'src/**/*.[jt]sx', 'lib/**/*.[jt]s', 'lib/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Run fast checks
        run: npm run check:fast

      - name: Run UI checks
        run: npm run check:ui
