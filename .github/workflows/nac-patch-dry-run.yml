name: NAC Patch Dry Run

on:
  pull_request:
    branches:
      - main
    paths:
      - data/patches/inbox/n-acetylcysteine-scite-enrichment-2026-07-12.json
      - .github/workflows/nac-patch-dry-run.yml

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Normalize exact NAC inbox patch
        run: |
          rm -rf data/patches/normalized
          mkdir -p data/patches/normalized
          npm run data:normalize-patch -- --file data/patches/inbox/n-acetylcysteine-scite-enrichment-2026-07-12.json | tee nac-normalize.log
          NORMALIZED=$(find data/patches/normalized -maxdepth 1 -type f -name '*.json' ! -name '*.report.json' | head -n 1)
          test -n "$NORMALIZED"
          echo "NORMALIZED_FILE=$NORMALIZED" >> "$GITHUB_ENV"
          cp "$NORMALIZED" nac-normalized-patch.json

      - name: Assert exact target and review scope
        run: |
          node <<'NODE'
          const fs = require('fs')
          const patch = JSON.parse(fs.readFileSync(process.env.NORMALIZED_FILE, 'utf8'))
          const expectedId = 'scite-n-acetylcysteine-evidence-2026-07-12-001'
          if (patch.patch_id !== expectedId) throw new Error(`unexpected patch id: ${patch.patch_id}`)
          if (patch.target?.slug !== 'n-acetylcysteine' || patch.target?.entity_type !== 'compound') {
            throw new Error(`unexpected target: ${JSON.stringify(patch.target)}`)
          }
          if (patch.operations?.length !== 6 || patch.sources?.length !== 7) {
            throw new Error(`unexpected patch scope: ${patch.operations?.length} ops, ${patch.sources?.length} sources`)
          }
          const fields = patch.operations.map((operation) => operation.field).filter(Boolean)
          if (fields.some((field) => field.startsWith('legacy.legacy.') || field.startsWith('data.data.'))) {
            throw new Error(`double-prefixed canonical field: ${fields.join(', ')}`)
          }
          for (const required of ['description', 'data.dosage', 'data.safety_notes', 'legacy.evidence_risk_of_bias']) {
            if (!fields.includes(required)) throw new Error(`missing required field: ${required}`)
          }
          NODE

      - name: Dry run exact normalized NAC patch
        run: npm run data:patches:dry-run -- --file "$NORMALIZED_FILE" | tee nac-dry-run.log

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nac-patch-dry-run
          path: |
            nac-normalize.log
            nac-dry-run.log
            nac-normalized-patch.json
          if-no-files-found: error
