name: Prepare Ashwagandha Evidence Review

on:
  push:
    branches:
      - data/ashwagandha-evidence-review

permissions:
  contents: write

jobs:
  prepare-review:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: data/ashwagandha-evidence-review
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Ashwagandha review pack
        run: npm run evidence:finalize -- --slug=ashwagandha

      - name: Verify review outputs
        run: |
          test -f data/reviews/evidence/ashwagandha.report.md
          test -f data/reviews/evidence/ashwagandha.report.json
          test -f data/reviews/evidence/ashwagandha.manifest.json
          node -e "const m=require('./data/reviews/evidence/ashwagandha.manifest.json'); if(m.decision!=='pending') throw new Error('manifest must remain pending'); console.log({patches:m.approved_patch_ids?.length, claims:m.approved_claim_ids?.length, sources:m.approved_source_ids?.length})"

      - name: Remove one-time workflow
        run: rm .github/workflows/prepare-ashwagandha-evidence-review.yml

      - name: Commit review pack
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reviews/evidence/ashwagandha.report.md \
            data/reviews/evidence/ashwagandha.report.json \
            data/reviews/evidence/ashwagandha.manifest.json \
            .github/workflows/prepare-ashwagandha-evidence-review.yml
          git commit -m "data: prepare Ashwagandha evidence review"
          git push origin HEAD:data/ashwagandha-evidence-review
