name: Prepare Magnesium Glycinate Review

on:
  push:
    branches:
      - data/magnesium-glycinate-evidence-review

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/magnesium-glycinate-evidence-review
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run evidence:finalize -- --slug=magnesium-glycinate
      - run: |
          test -f data/reviews/evidence/magnesium-glycinate.report.md
          test -f data/reviews/evidence/magnesium-glycinate.report.json
          test -f data/reviews/evidence/magnesium-glycinate.manifest.json
      - run: rm .github/workflows/prepare-magnesium-glycinate-review.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reviews/evidence/magnesium-glycinate.* .github/workflows/prepare-magnesium-glycinate-review.yml
          git commit -m "data: prepare magnesium glycinate evidence review"
          git push origin HEAD:data/magnesium-glycinate-evidence-review
