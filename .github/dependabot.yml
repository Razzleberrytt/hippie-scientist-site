version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Major dependency upgrades are migration projects, not routine maintenance.
      # Keep Dependabot focused on safer patch/minor updates.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      next-react:
        patterns:
          - "next"
          - "react*"
          - "@next/*"
          - "@types/react*"
      cloudflare-wrangler:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      testing-tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "prettier*"
          - "vitest"
          - "@types/vitest"
          - "typescript"
          - "@typescript-eslint/*"
          - "tsx"
          - "lint-staged"
          - "npm-run-all*"
      ui-animation:
        patterns:
          - "framer-motion"
          - "lucide-react"
