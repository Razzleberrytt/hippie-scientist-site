version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Keep major framework/runtime upgrades out of routine Dependabot PRs.
      # Upgrade these manually after a dedicated migration pass.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@next/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      next-react:
        patterns:
          - "next"
          - "react*"
          - "@next/*"
          - "@types/react*"
      cloudflare-wrangler:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      testing-tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "prettier*"
          - "vitest"
          - "@types/vitest"
          - "typescript"
          - "@typescript-eslint/*"
          - "tsx"
          - "lint-staged"
          - "npm-run-all*"
      ui-animation:
        patterns:
          - "framer-motion"
          - "lucide-react"
