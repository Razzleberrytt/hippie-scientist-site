version: 1
current: F1
default_branch: main
pr_branch_prefix: codex/
notes:
  - "Update only the current step and the next step."
  - "Statuses: queued | ready | done | blocked"

steps:
  - id: A1
    title: Deploy pipeline and SPA routing
    status: done
    risk: low
    success_checks:
      - "Netlify is the only deploy owner"
      - "redirects verified"
      - "no stale SPA shell cache rule"

  - id: A2
    title: Publish drafted blog posts and stop generating new drafts
    status: done
    risk: low
    success_checks:
      - "drafts published"
      - "future daily posts default to published"
      - "blog index regenerated"

  - id: A3
    title: Ensure build-blog writes per-post HTML files
    status: done
    risk: low
    success_checks:
      - "per-post HTML artifacts generated"
      - "count matches published posts"

  - id: A4
    title: Sitemap and RSS correctness
    status: done
    risk: low
    success_checks:
      - "herb URLs included"
      - "compound URLs included"
      - "blog URLs included"
      - "feed sorted and capped"

  - id: A5
    title: Metadata and root cleanup
    status: done
    risk: low
    success_checks:
      - "Helmet tags use real entity data"
      - "stale root artifacts removed"

  - id: B1
    title: Pipeline skeleton and migrations
    status: done
    risk: medium
    success_checks:
      - "schemas/providers/ops structure created"
      - "SQLite migrations exist"
      - "patch-first skeleton exists"

  - id: B2
    title: Prompt task packs and task-to-schema wiring
    status: done
    risk: medium
    success_checks:
      - "task -> prompt pack -> schema -> provider config resolution works"

  - id: B3
    title: Planning, dry-run, rollback manifests, and Lane C guard
    status: done
    risk: medium
    success_checks:
      - "deterministic run key exists"
      - "ULID runId exists"
      - "manifests written"
      - "dry-run blocks apply"
      - "Lane C apply guard enforced"

  - id: C1
    title: Mechanism schemas and domain validators
    status: done
    risk: medium
    success_checks:
      - "strict mechanism schemas finalized"
      - "mechanism fixtures pass"
      - "patch-ready mechanism outputs exist"

  - id: C2
    title: Dry-run mechanism batch for top entities
    status: done
    risk: low
    execution_notes:
      - "Run dry-run mechanism batches only (no apply step)."
      - "Use `mechanism-herb` with `--batch-size 30` and `mechanism-compound` with `--batch-size 20`."
      - "Then run dry-run schema/domain validation and a coverage report for the same run outputs."
    success_checks:
      - "top 30 herbs selected"
      - "top 20 compounds selected"
      - "dry-run patches generated"
      - "schema/domain validation recorded"
      - "coverage report written"

  - id: C3
    title: Apply approved Lane A mechanism patches
    status: done
    risk: medium
    success_checks:
      - "only approved Lane A patches applied"
      - "rollback manifest written"
      - "derived outputs regenerated"
      - "build and prebuild pass"

  - id: D1
    title: Canonical compound graph and bidirectional linking
    status: done
    risk: medium
    success_checks:
      - "entity graph normalized"
      - "strict matching only"
      - "mismatches patchable"
      - "unmatched strings surfaced for review"

  - id: E1
    title: Dosage normalization lane
    status: done
    risk: high
    success_checks:
      - "dosage schema finalized"
      - "Lane B review flow enforced"
      - "review batch generated"

  - id: E2
    title: Interaction tags and herb-drug interactions
    status: done
    risk: high
    success_checks:
      - "interaction schema finalized"
      - "Lane C mandatory review enforced"
      - "prebuiltCombos uses approved data only"

  - id: F1
    title: Source suggestion workflow and claim backlog
    status: ready
    risk: high
    success_checks:
      - "source suggestion schema finalized"
      - "claim-level backlog entries created"
      - "unverified sources never treated as evidence"

  - id: F2
    title: Evals, coverage, and deployment gates
    status: queued
    risk: medium
    success_checks:
      - "goldens scaffolded"
      - "eval metrics produced"
      - "release gate script blocks regressions"

  - id: G1
    title: End-to-end audit and gap close
    status: queued
    risk: medium
    success_checks:
      - "spec gap list written"
      - "small required gaps closed"
      - "final readiness summary produced"
