version: 1
current: H1
default_branch: main
pr_branch_prefix: codex/
notes:
  - "Update only the current step and the next step."
  - "Statuses: queued | ready | done | blocked"

steps:
  - id: A1
    title: Deploy pipeline and SPA routing
    status: done
    risk: low
    success_checks:
      - "Netlify is the only deploy owner"
      - "redirects verified"
      - "no stale SPA shell cache rule"

  - id: A2
    title: Publish drafted blog posts and stop generating new drafts
    status: done
    risk: low
    success_checks:
      - "drafts published"
      - "future daily posts default to published"
      - "blog index regenerated"

  - id: A3
    title: Ensure build-blog writes per-post HTML files
    status: done
    risk: low
    success_checks:
      - "per-post HTML artifacts generated"
      - "count matches published posts"

  - id: A4
    title: Sitemap and RSS correctness
    status: done
    risk: low
    success_checks:
      - "herb URLs included"
      - "compound URLs included"
      - "blog URLs included"
      - "feed sorted and capped"

  - id: A5
    title: Metadata and root cleanup
    status: done
    risk: low
    success_checks:
      - "Helmet tags use real entity data"
      - "stale root artifacts removed"

  - id: B1
    title: Pipeline skeleton and migrations
    status: done
    risk: medium
    success_checks:
      - "schemas/providers/ops structure created"
      - "SQLite migrations exist"
      - "patch-first skeleton exists"

  - id: B2
    title: Prompt task packs and task-to-schema wiring
    status: done
    risk: medium
    success_checks:
      - "task -> prompt pack -> schema -> provider config resolution works"

  - id: B3
    title: Planning, dry-run, rollback manifests, and Lane C guard
    status: done
    risk: medium
    success_checks:
      - "deterministic run key exists"
      - "ULID runId exists"
      - "manifests written"
      - "dry-run blocks apply"
      - "Lane C apply guard enforced"

  - id: C1
    title: Mechanism schemas and domain validators
    status: done
    risk: medium
    success_checks:
      - "strict mechanism schemas finalized"
      - "mechanism fixtures pass"
      - "patch-ready mechanism outputs exist"

  - id: C2
    title: Dry-run mechanism batch for top entities
    status: done
    risk: low
    execution_notes:
      - "Run dry-run mechanism batches only (no apply step)."
      - "Use `mechanism-herb` with `--batch-size 30` and `mechanism-compound` with `--batch-size 20`."
      - "Then run dry-run schema/domain validation and a coverage report for the same run outputs."
    success_checks:
      - "top 30 herbs selected"
      - "top 20 compounds selected"
      - "dry-run patches generated"
      - "schema/domain validation recorded"
      - "coverage report written"

  - id: C3
    title: Apply approved Lane A mechanism patches
    status: done
    risk: medium
    success_checks:
      - "only approved Lane A patches applied"
      - "rollback manifest written"
      - "derived outputs regenerated"
      - "build and prebuild pass"

  - id: D1
    title: Canonical compound graph and bidirectional linking
    status: done
    risk: medium
    success_checks:
      - "entity graph normalized"
      - "strict matching only"
      - "mismatches patchable"
      - "unmatched strings surfaced for review"

  - id: E1
    title: Dosage normalization lane
    status: done
    risk: high
    success_checks:
      - "dosage schema finalized"
      - "Lane B review flow enforced"
      - "review batch generated"

  - id: E2
    title: Interaction tags and herb-drug interactions
    status: done
    risk: high
    success_checks:
      - "interaction schema finalized"
      - "Lane C mandatory review enforced"
      - "prebuiltCombos uses approved data only"

  - id: F1
    title: Source suggestion workflow and claim backlog
    status: done
    risk: high
    success_checks:
      - "source suggestion schema finalized"
      - "claim-level backlog entries created"
      - "unverified sources never treated as evidence"

  - id: F2
    title: Evals, coverage, and deployment gates
    status: done
    risk: medium
    success_checks:
      - "goldens scaffolded"
      - "eval metrics produced"
      - "release gate script blocks regressions"

  - id: G1
    title: End-to-end audit and gap close
    status: done
    risk: medium
    success_checks:
      - "spec gap list written"
      - "small required gaps closed"
      - "final readiness summary produced"

  - id: H1
    title: Provider runtime failure classification and retry boundaries
    status: ready
    risk: medium
    success_checks:
      - "provider runtime distinguishes retryable, fatal, and auth/config failures"
      - "batch reports expose failure class without mutating source data"
      - "retry behavior stays explicit and lane guards remain unchanged"

  - id: H2
    title: Run-keyed coverage baselines and baseline diff artifacts
    status: queued
    risk: low
    success_checks:
      - "coverage reports can write named run-keyed baselines"
      - "baseline-to-current diff artifacts are emitted deterministically"
      - "dry-run reporting stays read-only"

  - id: H3
    title: Run-keyed eval baselines and release-gate comparison wiring
    status: queued
    risk: medium
    success_checks:
      - "eval outputs support named run-keyed baselines"
      - "release gate can compare current eval metrics against a selected baseline"
      - "baseline misses fail clearly without weakening checks"

  - id: H4
    title: Reviewed compound narrative backfill seed set
    status: queued
    risk: medium
    success_checks:
      - "a small reviewed compound seed set is defined for backfill"
      - "review-ready artifacts are scoped to approved compound pages only"
      - "existing quality thresholds stay intact unless explicitly documented"

  - id: H5
    title: Reviewed herb evidence backfill starter batch
    status: queued
    risk: medium
    success_checks:
      - "a small reviewed herb evidence batch is prepared in queue-compatible form"
      - "unverified sources remain excluded from accepted evidence"
      - "backfill output is reviewable without auto-apply behavior"

  - id: H6
    title: Controlled bidirectional link backlog reduction batches
    status: queued
    risk: medium
    success_checks:
      - "strict-match link backlog batches are generated in controlled scope"
      - "mismatch and no-match cases remain surfaced for human review"
      - "link backlog count is measurable before and after each batch"

  - id: H7
    title: Lane B and Lane C review throughput reporting
    status: queued
    risk: medium
    success_checks:
      - "review decision reporting summarizes throughput by lane and run"
      - "claim backlog visibility improves without bypassing human review"
      - "reports are written to stable ops reporting locations"

  - id: H8
    title: Patch and review manifest ergonomics
    status: queued
    risk: medium
    success_checks:
      - "patch manifests surface review-critical fields more clearly"
      - "rollback and apply metadata remain lossless"
      - "ergonomic changes do not alter patch semantics"

  - id: H9
    title: Fixture expansion for provider and validator edge cases
    status: queued
    risk: low
    success_checks:
      - "provider runtime failure modes have targeted fixtures or tests"
      - "schema and domain validator edge cases gain regression coverage"
      - "fixtures stay minimal and representative"

  - id: H10
    title: Operator docs for review queues and local-only refresh boundaries
    status: queued
    risk: low
    success_checks:
      - "operator docs clearly separate CI-safe validation from local-only refresh flows"
      - "review queue steps and approval expectations are easier to follow"
      - "docs reference existing commands rather than inventing new workflow paths"

  - id: H11
    title: Deploy workflow validation for build and redirect realism
    status: queued
    risk: medium
    success_checks:
      - "deploy validation checks match the documented release path"
      - "redirect and prerender verification run in the right stage"
      - "workflow changes do not introduce local-only data refresh requirements"

  - id: H12
    title: Release hardening pass across baselines reports and docs
    status: queued
    risk: medium
    success_checks:
      - "release checklist reflects baseline comparison and review-report expectations"
      - "final hardening pass verifies the new reporting path end to end"
      - "no lane safety or approval guard is weakened"
